services:
  - type: web
    name: crm-advogado
    env: static
    buildCommand: NODE_OPTIONS=--max-old-space-size=6144 npm install && NODE_OPTIONS=--max-old-space-size=6144 npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_OPTIONS
        value: --max-old-space-size=6144
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
